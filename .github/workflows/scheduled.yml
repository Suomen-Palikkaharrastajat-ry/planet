name: Scheduled update

on:
  schedule:
    - cron: '0 0,6,12,18 * * *' # Four times per day
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-scheduled
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: cachix/cachix-action@v16
        with:
          name: palikkaharrastajat
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          extraPullNames: devenv

      - name: Install devenv
        run: nix profile install nixpkgs#devenv

      - uses: actions/cache@v4
        with:
          path: |
            elm-app/elm-stuff
            ~/.cabal/packages
            ~/.cabal/store
            dist-newstyle
            planet
          key: build-${{ runner.os }}-${{ hashFiles('elm-app/elm.json', 'planet.cabal', 'cabal.project', 'cabal.project.freeze', 'pkgs/package-lock.json') }}
          restore-keys: build-${{ runner.os }}-

      - name: Bootstrap frozen Cabal package index
        run: |
          INDEX_STATE="$(sed -n 's/^index-state:[[:space:]]*//p' cabal.project)"
          devenv shell --profile ci -- cabal update --project-file=cabal.project --index-state="$INDEX_STATE"

      - name: Build
        run: devenv shell --profile ci -- make dist-ci

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
