name: Scheduled update

on:
  schedule:
    - cron: '0 0,6,12,18 * * *' # Four times per day
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-scheduled
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Restore Planet CLI ────────────────────────────────────────────────────

      - uses: actions/cache/restore@v4
        id: binary-cache
        with:
          path: ./planet
          key: binary-planet-${{ runner.os }}-${{ hashFiles('planet.cabal', 'src/**/*.hs') }}

      - if: steps.binary-cache.outputs.cache-hit != 'true'
        name: Setup Haskell (fallback build)
        uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.6'
          cabal-version: 'latest'

      - if: steps.binary-cache.outputs.cache-hit != 'true'
        run: make build

      - run: chmod +x ./planet

      # ── Node / Elm caches ─────────────────────────────────────────────────────

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'elm-app/pnpm-lock.yaml'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.elm
            elm-app/elm-stuff
          key: elm-${{ runner.os }}-${{ hashFiles('elm-app/elm.json') }}
          restore-keys: elm-${{ runner.os }}-

      # ── Build ─────────────────────────────────────────────────────────────────

      - name: Generate Data
        run: ./planet

      - name: Build Elm App
        run: |
          cd elm-app
          pnpm install
          pnpm run build

      # ── Deploy ────────────────────────────────────────────────────────────────

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./elm-app/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
